name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python opencv-contrib-python numpy Pillow plyer psutil pystray tkinter-tooltip mediapipe requests pyinstaller
      shell: cmd

    - name: Download face landmarker model
      run: |
        python download_models.py

    - name: Build standalone EXE with PyInstaller
      run: |
        pyinstaller --clean EyeGuardian.spec

    - name: Verify EXE was created
      run: |
        if (Test-Path "dist\EyeGuardian.exe") {
          $size = (Get-Item "dist\EyeGuardian.exe").Length / 1MB
          Write-Host "EyeGuardian.exe created successfully ($([math]::Round($size, 2)) MB)"
          Write-Host "This EXE has Python embedded - no Python installation needed on target machine"
        } else {
          Write-Error "EyeGuardian.exe was not found!"
          exit 1
        }
      shell: pwsh

    - name: Build Installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      shell: pwsh

    - name: Verify Installer was created
      run: |
        if (Test-Path "dist\EyeGuardianSetup.exe") {
          $size = (Get-Item "dist\EyeGuardianSetup.exe").Length / 1MB
          Write-Host "EyeGuardianSetup.exe created ($([math]::Round($size, 2)) MB)"
        } else {
          Write-Error "Installer was not created!"
          exit 1
        }
      shell: pwsh

    # Upload the standalone EXE (portable, no install needed)
    - name: Upload Standalone EXE
      uses: actions/upload-artifact@v4
      with:
        name: EyeGuardian-Portable
        path: dist/EyeGuardian.exe

    # Upload the installer (Setup.exe with shortcuts, autostart, uninstaller)
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: EyeGuardian-Installer
        path: dist/EyeGuardianSetup.exe
