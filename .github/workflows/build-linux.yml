name: Build Linux Package

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-opencv libnotify-bin
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Download MediaPipe model
      run: python download_models.py
      
    - name: Build executable with PyInstaller
      run: pyinstaller --clean EyeGuardian.spec
      
    - name: Create tarball
      run: |
        cd dist
        tar -czf EyeGuardian-Linux.tar.gz EyeGuardian
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyeGuardian-Linux
        path: dist/EyeGuardian-Linux.tar.gz
        retention-days: 30
        
    - name: Create release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/EyeGuardian-Linux.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
